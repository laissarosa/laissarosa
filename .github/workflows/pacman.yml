name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'  # roda todos os dias à meia-noite UTC
  workflow_dispatch:      # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pacman-contributions
        run: npm install @laissarosa/pacman-contributions --save-dev

      - name: Generate Pac-Man SVG (light)
        run: npx pacman-contributions --output output/pacman-contribution-graph.svg --theme light

      - name: Generate Pac-Man SVG (dark)
        run: npx pacman-contributions --output output/pacman-contribution-graph-dark.svg --theme dark

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.svg
          git commit -m "Update Pac-Man contribution graphs" || echo "No changes to commit"
          git push
