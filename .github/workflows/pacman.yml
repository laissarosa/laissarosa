name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'  # roda todo dia à meia-noite UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # garante permissão para commit/push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Pac-Man Contribution Graph
        id: pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: laissarosa
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Pac-Man SVG
        run: |
          mkdir -p output
          echo "${{ steps.pacman.outputs.svg }}" > output/pacman-contribution-graph.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/pacman-contribution-graph.svg
          git commit -m "Update Pac-Man contribution graph" || echo "No changes to commit"
          git push
          
