name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'  # roda todo dia à meia-noite UTC
  workflow_dispatch:      # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Pac-Man SVG (light)
        uses: abozanona/pacman-contribution-graph@main
        with:
          username: laissarosa
          theme: light
          output: output/pacman-contribution-graph.svg

      - name: Generate Pac-Man SVG (dark)
        uses: abozanona/pacman-contribution-graph@main
        with:
          username: laissarosa
          theme: dark
          output: output/pacman-contribution-graph-dark.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.svg
          git commit -m "Update Pac-Man contribution graphs" || echo "No changes to commit"
          git push
