name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'  # roda todo dia à meia-noite UTC
  workflow_dispatch:      # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Pac-Man Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: laissarosa
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacman-contribution-graph.svg
          git commit -m "Update Pac-Man contribution graph" || echo "No changes to commit"
          git push
